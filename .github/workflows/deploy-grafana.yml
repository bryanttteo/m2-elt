name: Deploy Grafana (Cloud Run)

# Self-hosted Grafana with provisioned Cloud Monitoring + BigQuery datasources
# and the Olist dashboards. Fires when the grafana folder (or this workflow)
# changes on main. Admin password comes from a repo secret.

on:
  push:
    branches: [main]
    paths:
      - 'p6_orchestration/observability/grafana/**'
      - '.github/workflows/deploy-grafana.yml'
  workflow_dispatch: {}

env:
  PROJECT: sctp-team2-project2-elt
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy to Cloud Run
        working-directory: p6_orchestration/observability/grafana
        run: |
          make deploy PROJECT="$PROJECT" REGION="$REGION" \
            ADMIN_PASS="${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
